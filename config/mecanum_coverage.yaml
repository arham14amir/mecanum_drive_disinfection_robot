coverage_server:
  ros__parameters:
    use_sim_time: False
    
    # --- Robot Physics ---
    robot_width: 0.45
    operation_width: 0.15
    min_turning_radius: 0.0
    
    # --- Path Settings (Sawtooth) ---
    default_path_type: "REEDS_SHEPP"
    default_path_continuity_type: "DISCONTINUOUS"
    default_route_type: "BOUSTROPHEDON"
    
    # --- THE SAFETY FIX ---
    default_headland_type: "CONSTANT"
    
    # 0.3 meters = 0.225 (Half Robot) + 0.075 (Safety Buffer)
    # This keeps the robot fully INSIDE the green line.
    default_headland_width: 0.30
    default_swath_angle_type: "BRUTE_FORCE"