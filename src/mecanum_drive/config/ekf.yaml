### ekf.yaml ###
ekf_filter_node:
  ros__parameters:
    frequency: 10.0
    two_d_mode: true
    publish_tf: true
    
    
    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- INPUT 1: WHEEL ODOMETRY ---
    # We will remap your existing odom to "odom_unfiltered"
    odom0: /odom_unfiltered
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,   # Trust Wheels for X/Y Speed
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_queue_size: 10

    # --- INPUT 2: IMU (The Drift Fixer) ---
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,    # Trust Gyro for Rotation (Z Speed)
                  false, false, false]
    imu0_differential: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true